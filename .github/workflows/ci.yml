name: Publication validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify committed publication figures exist
        shell: bash
        run: |
          set -euo pipefail
          files=(
            "05_figures/scoring_heatmap.png"
            "05_figures/lorenz_buidl.png"
            "05_figures/market_comparison.png"
            "05_figures/aum_timeseries.png"
            "05_figures/aum_timeseries.svg"
            "05_figures/gradient_staircase.png"
            "05_figures/gradient_staircase.svg"
          )
          for file in "${files[@]}"; do
            test -f "$file"
            git ls-files --error-unmatch "$file" >/dev/null
          done

      - name: Run non-mutating repository checks
        run: python validate_repository.py

      - name: Regenerate and validate publication
        env:
          MPLBACKEND: Agg
          PYTHONWARNINGS: error::UserWarning
        run: python validate_publication.py

      - name: Verify generators do not modify source files
        shell: bash
        run: |
          git diff --exit-code -- . \
            ':(exclude)05_figures/*.png' \
            ':(exclude)05_figures/*.svg'

      - name: Report platform-specific figure differences
        if: always()
        shell: bash
        run: git diff --stat -- 05_figures || true
